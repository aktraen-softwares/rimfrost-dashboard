services:
  app:
    build: .
    ports:
      - "80:5000"
    environment:
      - DATABASE_URL=postgresql://rimfrost:rimfrost_db_pass_2026@db:5432/rimfrost
      - SECRET_KEY=rimfrost_super_secret_2026
      - FLASK_ENV=production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rimfrost
      POSTGRES_USER: rimfrost
      POSTGRES_PASSWORD: rimfrost_db_pass_2026
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rimfrost -d rimfrost"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
