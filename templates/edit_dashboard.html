{% extends "base.html" %}
{% block title %}Edit {{ dashboard.title }} - Rimfrost Analytics{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Edit Dashboard</h1>
        <p class="page-subtitle">Update dashboard settings</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('edit_dashboard', dashboard_id=dashboard.id) }}">
        <div class="form-group">
            <label for="title">Dashboard Title</label>
            <input type="text" id="title" name="title" value="{{ dashboard.title }}" required>
            <span class="form-hint">Give your dashboard a descriptive name</span>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3">{{ dashboard.description or '' }}</textarea>
        </div>

        <div class="form-group">
            <label for="dashboard_type">Dashboard Type</label>
            <select id="dashboard_type" name="dashboard_type">
                {% for dtype in ['general', 'revenue', 'traffic', 'security', 'performance'] %}
                <option value="{{ dtype }}" {% if dashboard.dashboard_type == dtype %}selected{% endif %}>{{ dtype | title }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('view_dashboard', dashboard_id=dashboard.id) }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
