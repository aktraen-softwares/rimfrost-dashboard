{% extends "base.html" %}
{% block title %}Sign In - Rimfrost Analytics{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#6366f1"/>
                    <path d="M10 20L16 14L22 20L28 12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M10 28H30" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
            <h1>Rimfrost Analytics</h1>
            <p class="login-subtitle">Sign in to your analytics dashboard</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}" class="login-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@rimfrost.is" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Rimfrost Analytics &mdash; Real-time business intelligence</p>
        </div>
    </div>
</div>
{% endblock %}
