{% extends "base.html" %}
{% block title %}New Dashboard - Rimfrost Analytics{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Create Dashboard</h1>
        <p class="page-subtitle">Set up a new analytics dashboard</p>
    </div>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('create_dashboard') }}">
        <div class="form-group">
            <label for="title">Dashboard Title</label>
            <input type="text" id="title" name="title" placeholder="e.g., Q1 Revenue Overview" required>
            <span class="form-hint">Give your dashboard a descriptive name</span>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="3" placeholder="What does this dashboard track?"></textarea>
        </div>

        <div class="form-group">
            <label for="dashboard_type">Dashboard Type</label>
            <select id="dashboard_type" name="dashboard_type">
                <option value="general">General</option>
                <option value="revenue">Revenue</option>
                <option value="traffic">Traffic</option>
                <option value="security">Security</option>
                <option value="performance">Performance</option>
            </select>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('dashboards') }}" class="btn btn-secondary">Cancel</a>
            <button type="submit" class="btn btn-primary">Create Dashboard</button>
        </div>
    </form>
</div>
{% endblock %}
